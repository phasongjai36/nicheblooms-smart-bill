name: CI - Code Quality & Build Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: ✅ TypeScript Type Check
        run: npx tsc --noEmit

      - name: 📋 Format Check (Prettier)
        run: npx prettier --check .

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build project
        run: npm run build

      - name: 📊 Build artifact size check
        run: |
          # ตรวจสอบก่อนว่าโฟลเดอร์ dist มีอยู่จริงไหม เพื่อป้องกันสคริปต์พัง
          if [ -d "dist" ]; then
            DIST_SIZE=$(du -sh dist | cut -f1)
            echo "Build size: $DIST_SIZE"
          else
            echo "⚠️ 'dist' directory not found. Please verify your build output folder name."
          fi
          echo "✅ Build completed successfully"

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🔒 Run npm audit
        run: npm audit --audit-level=high

  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, build, security]
    if: always()

    steps:
      - name: ✅ Workflow Status
        run: |
          echo "========================================"
          echo "🤖 AI Prompt Studio - CI Pipeline"
          echo "========================================"
          echo "Repository: phasongjai36/ai-prompt-studio"
          echo "Trigger:    ${{ github.event_name }}"
          echo "Branch:     ${{ github.ref }}"
          echo "Commit:     ${{ github.sha }}"
          echo "========================================"
          echo "📊 JOB STATUS:"
          echo "✓ Lint & Type Check: ${{ needs.lint-and-type-check.result }}"
          echo "✓ Build Verification: ${{ needs.build.result }}"
          echo "✓ Security Audit:     ${{ needs.security.result }}"
          echo "========================================"
          
          # เช็คว่ามี job ไหนพังไหม เพื่อรายงานผลภาพรวมให้ถูกต้อง
          if [[ "${{ needs.lint-and-type-check.result }}" == "success" && "${{ needs.build.result }}" == "success" && "${{ needs.security.result }}" == "success" ]]; then
            echo "🚀 All checks passed successfully!"
          else
            echo "❌ Some checks failed. Please review the logs above."
            exit 1
          fi
